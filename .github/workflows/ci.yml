name: CI

on:
  push:
    paths:
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  extension:
    name: Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck extension
        run: pnpm --dir apps/extension exec tsc --noEmit

      - name: Test extension
        run: pnpm --dir apps/extension test

      - name: Build extension
        run: pnpm --dir apps/extension build

  server:
    name: Server
    runs-on: ubuntu-latest
    env:
      DRAFTLET_DATABASE_URL: sqlite:////tmp/draftlet-ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install server dependencies
        working-directory: apps/server
        run: uv sync --group dev

      - name: Run server tests
        working-directory: apps/server
        run: uv run pytest

      - name: Run migrations
        working-directory: apps/server
        run: uv run alembic upgrade head

  desktop:
    name: Desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --dir apps/desktop typecheck

      - name: Test desktop
        run: pnpm --dir apps/desktop test
